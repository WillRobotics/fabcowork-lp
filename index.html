<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FabCoWork - 製造業のためのAIコワーカー</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (for compiling JSX in the browser) -->
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    /* 基本的なフォント設定 */
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    @keyframes viewerFadeIn {
      0% { opacity: 0; transform: translateY(6px) scale(0.985); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .viewer-fade {
      animation: viewerFadeIn 0.45s ease-out;
    }
    @keyframes progressBar {
      0% { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }
    .progress-bar {
      transform-origin: left;
      animation: progressBar var(--auto-advance-duration, 3500ms) linear forwards;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-fade { animation: modalFadeIn 0.2s ease-out; }
    .modal-slide { animation: modalSlideUp 0.28s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useContext, createContext } = React;

    const ContactContext = createContext(() => {});
    const useContact = () => useContext(ContactContext);

    const LegalContext = createContext(() => {});
    const useLegal = () => useContext(LegalContext);

    const LEGAL_DOCS = {
      privacy: {
        title: 'プライバシーポリシー',
        eyebrow: 'PRIVACY POLICY',
        updated: '2026年4月1日',
        intro: '合同会社WillRobotics（以下「当社」）は、当社が提供するソフトウェア「FabCoWork」（以下「本サービス」）における、ユーザーの個人情報（以下「ユーザー情報」）の取扱いについて、以下のとおりプライバシーポリシー（以下「本ポリシー」）を定めます。',
        sections: [
          { heading: '第1条（取得する情報）', body: '当社は、本サービスの提供にあたり、以下の情報を取得します。\n・氏名、会社名、部署、メールアドレス、電話番号などの登録情報\n・本サービス利用時の操作ログ、デバイス情報、IPアドレス\n・お問い合わせフォーム経由でご提供いただく情報' },
          { heading: '第2条（利用目的）', body: '当社は、取得したユーザー情報を以下の目的のために利用します。\n・本サービスの提供および運営\n・利用料金の請求および支払処理\n・お問い合わせへの対応\n・新機能、サービス改善のお知らせ\n・利用規約違反の調査および対応\n・統計データの作成（個人を特定できない形に加工）' },
          { heading: '第3条（第三者提供）', body: '当社は、法令に基づく場合または事前にユーザーの同意を得た場合を除き、ユーザー情報を第三者に提供しません。' },
          { heading: '第4条（外部サービスの利用）', body: '当社は、本サービスの提供にあたり、以下の外部サービスを利用する場合があります。これらの外部サービスにおける情報の取扱いは、各サービスのプライバシーポリシーに従います。\n・クラウドホスティング（Amazon Web Services 等）\n・AI 推論サービス（OpenAI API、Anthropic API 等）\n・利用状況分析ツール' },
          { heading: '第5条（ローカルデータの取扱い）', body: '本サービスにおいて、ユーザーのローカルPCに保存されたCAD図面、PDF、Excelファイル等の機密データは、ユーザーが明示的に指示した場合を除き、当社サーバーに送信されません。' },
          { heading: '第6条（安全管理措置）', body: '当社は、ユーザー情報の漏えい、滅失、毀損の防止、その他の安全管理のために必要かつ適切な措置を講じます。' },
          { heading: '第7条（開示・訂正・削除等）', body: 'ユーザーは、当社に対し、当社が保有するご自身のユーザー情報の開示、訂正、削除を請求できます。お問い合わせ窓口までご連絡ください。' },
          { heading: '第8条（改定）', body: '当社は、必要に応じて本ポリシーを改定することがあります。重要な変更がある場合は、本サービス上で通知します。' },
          { heading: '第9条（お問い合わせ窓口）', body: '本ポリシーに関するお問い合わせは、以下の窓口までご連絡ください。\n合同会社WillRobotics\nhttps://willrobotics.com/' },
        ],
      },
      terms: {
        title: '利用規約',
        eyebrow: 'TERMS OF SERVICE',
        updated: '2026年4月1日',
        intro: '本利用規約（以下「本規約」）は、合同会社WillRobotics（以下「当社」）が提供するソフトウェア「FabCoWork」（以下「本サービス」）の利用条件を定めるものです。本サービスをご利用になるユーザー（以下「ユーザー」）には、本規約に同意の上、本サービスをご利用いただきます。',
        sections: [
          { heading: '第1条（適用）', body: '本規約は、ユーザーと当社との間の本サービスの利用に関わる一切の関係に適用されます。' },
          { heading: '第2条（利用登録）', body: '本サービスの利用を希望する者は、本規約に同意の上、当社所定の方法で利用登録を申請するものとします。当社は、登録希望者が反社会的勢力に該当する場合、または過去に本規約違反があった場合等、当社が登録を不適当と判断した場合には、登録を承認しないことがあります。' },
          { heading: '第3条（アカウント管理）', body: 'ユーザーは、自己の責任においてアカウント情報を管理するものとし、これを第三者に利用させ、または貸与、譲渡、売買等してはなりません。' },
          { heading: '第4条（利用料金）', body: 'ユーザーは、本サービスの有償部分の利用にあたり、当社が別途定める料金を、当社が指定する方法で支払うものとします。ユーザーが料金の支払を遅滞した場合、年14.6%の割合による遅延損害金を支払うものとします。' },
          { heading: '第5条（禁止事項）', body: 'ユーザーは、本サービスの利用にあたり、以下の行為をしてはなりません。\n・法令または公序良俗に違反する行為\n・犯罪行為に関連する行為\n・本サービスの運営を妨害する行為\n・他のユーザーまたは第三者の権利を侵害する行為\n・リバースエンジニアリング、逆コンパイル、逆アセンブル\n・本サービスを不正な目的で利用する行為\n・その他、当社が不適切と判断する行為' },
          { heading: '第6条（本サービス提供の停止等）', body: '当社は、メンテナンス、システム障害、その他やむを得ない事由が発生した場合、ユーザーへの事前通知なく本サービスの全部または一部の提供を停止または中断することができます。' },
          { heading: '第7条（著作権・知的財産権）', body: '本サービスに関する著作権、その他一切の知的財産権は、当社または当社にライセンスを許諾している者に帰属します。ユーザーは、本サービスを通じて生成されたコンテンツ（出力データ）を、自己の業務目的で使用することができます。' },
          { heading: '第8条（保証の否認および免責事項）', body: '当社は、本サービスに事実上または法律上の瑕疵（安全性、信頼性、正確性、完全性、有効性、特定の目的への適合性を含む）がないことを明示的にも黙示的にも保証しません。当社は、本サービスに起因してユーザーに生じた損害について、当社の故意または重過失による場合を除き、一切の責任を負いません。' },
          { heading: '第9条（サービス内容の変更等）', body: '当社は、ユーザーへの事前通知をもって、本サービスの内容を変更、追加または廃止することができます。' },
          { heading: '第10条（規約の変更）', body: '当社は、必要と判断した場合、ユーザーへ事前に通知の上、本規約をいつでも変更できるものとします。' },
          { heading: '第11条（個人情報の取扱い）', body: '本サービスにおける個人情報の取扱いは、別途定めるプライバシーポリシーに従います。' },
          { heading: '第12条（準拠法・裁判管轄）', body: '本規約の解釈にあたっては、日本法を準拠法とします。本サービスに関して紛争が生じた場合には、当社の本店所在地を管轄する裁判所を専属的合意管轄とします。' },
        ],
      },
    };

    const LegalModal = ({ open, kind, onClose }) => {
      useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        window.addEventListener('keydown', onKey);
        return () => {
          document.body.style.overflow = prev;
          window.removeEventListener('keydown', onKey);
        };
      }, [open, onClose]);

      if (!open || !kind) return null;
      const doc = LEGAL_DOCS[kind];
      if (!doc) return null;

      return (
        <div className="modal-fade fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-950/75 backdrop-blur-sm" onClick={onClose}>
          <div className="modal-slide bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] flex flex-col relative" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-start justify-between gap-4 px-6 md:px-8 pt-6 pb-4 border-b border-slate-200">
              <div className="min-w-0">
                <div className="text-[11px] font-semibold tracking-[0.18em] text-emerald-600 mb-1">{doc.eyebrow}</div>
                <h3 className="text-2xl font-bold text-slate-900">{doc.title}</h3>
                <div className="text-xs text-slate-500 mt-1">最終更新日: {doc.updated}</div>
              </div>
              <button onClick={onClose} aria-label="閉じる" className="shrink-0 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-md p-1.5 transition">
                <Icon name="X" size={18}/>
              </button>
            </div>
            <div className="overflow-y-auto px-6 md:px-8 py-6 text-sm text-slate-700 leading-relaxed">
              <p className="text-slate-600 mb-6">{doc.intro}</p>
              <div className="space-y-5">
                {doc.sections.map((s, i) => (
                  <section key={i}>
                    <h4 className="font-bold text-slate-900 mb-2">{s.heading}</h4>
                    <p className="whitespace-pre-line text-slate-600 text-[13px] leading-relaxed">{s.body}</p>
                  </section>
                ))}
              </div>
            </div>
            <div className="px-6 md:px-8 py-4 border-t border-slate-200 flex justify-end">
              <button onClick={onClose} className="px-6 py-2 rounded-md bg-slate-900 hover:bg-slate-800 text-white text-sm font-bold transition">
                閉じる
              </button>
            </div>
          </div>
        </div>
      );
    };

    const EMPTY_FORM = {
      inquiry: 'contact',
      company: '',
      department: '',
      name: '',
      email: '',
      phone: '',
      message: '',
      website: '',
    };

    const ContactForm = ({ open, type, onClose }) => {
      const [submitted, setSubmitted] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [agree, setAgree] = useState(false);
      const [form, setForm] = useState({ ...EMPTY_FORM, inquiry: type });
      const openLegal = useLegal();

      useEffect(() => {
        if (open) {
          setSubmitted(false);
          setSubmitting(false);
          setErrorMsg('');
          setAgree(false);
          setForm({ ...EMPTY_FORM, inquiry: type });
        }
      }, [open, type]);

      const setField = (key) => (e) => setForm((f) => ({ ...f, [key]: e.target.value }));

      useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        window.addEventListener('keydown', onKey);
        return () => {
          document.body.style.overflow = prev;
          window.removeEventListener('keydown', onKey);
        };
      }, [open, onClose]);

      if (!open) return null;

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (submitting) return;
        setErrorMsg('');
        setSubmitting(true);
        try {
          const res = await fetch('/api/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) {
            throw new Error(data.error || '送信に失敗しました。時間をおいて再度お試しください。');
          }
          setSubmitted(true);
        } catch (err) {
          setErrorMsg(err.message || '送信に失敗しました。時間をおいて再度お試しください。');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div className="modal-fade fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/75 backdrop-blur-sm" onClick={onClose}>
          <div className="modal-slide bg-white rounded-2xl shadow-2xl max-w-xl w-full max-h-[92vh] overflow-y-auto relative" onClick={(e) => e.stopPropagation()}>
            <button onClick={onClose} aria-label="閉じる" className="absolute top-4 right-4 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-md p-1.5 transition z-10">
              <Icon name="X" size={18}/>
            </button>
            {submitted ? (
              <div className="p-10 text-center">
                <div className="w-16 h-16 mx-auto bg-emerald-100 rounded-full flex items-center justify-center mb-5">
                  <Icon name="CheckCircle2" size={36} className="text-emerald-500"/>
                </div>
                <h3 className="text-xl font-bold text-slate-900 mb-3">送信ありがとうございます</h3>
                <p className="text-sm text-slate-600 mb-7 leading-relaxed">
                  担当者より2営業日以内にご連絡いたします。<br/>
                  お急ぎの場合は <a href="https://willrobotics.com/" target="_blank" rel="noopener noreferrer" className="text-emerald-600 hover:underline">https://willrobotics.com/</a> よりご連絡ください。
                </p>
                <button onClick={onClose} className="bg-emerald-500 hover:bg-emerald-400 text-slate-950 px-8 py-2.5 rounded-lg text-sm font-bold transition">
                  閉じる
                </button>
              </div>
            ) : (
              <div className="p-6 md:p-8">
                <div className="mb-6">
                  <div className="text-[11px] font-semibold tracking-[0.18em] text-emerald-600 mb-1">CONTACT</div>
                  <h3 className="text-2xl font-bold text-slate-900">お問い合わせ</h3>
                  <p className="text-sm text-slate-500 mt-1.5">必要事項をご記入のうえ送信ください。担当者より折り返しご連絡いたします。</p>
                </div>
                <form onSubmit={handleSubmit} className="space-y-4" noValidate>
                  {/* Honeypot field - hidden from real users; bots tend to fill it */}
                  <input
                    type="text"
                    name="website"
                    value={form.website}
                    onChange={setField('website')}
                    tabIndex={-1}
                    autoComplete="off"
                    aria-hidden="true"
                    className="absolute -left-[9999px] w-px h-px opacity-0"
                  />
                  <div>
                    <label className="block text-xs font-semibold text-slate-700 mb-1.5">ご相談内容 <span className="text-red-500">*</span></label>
                    <select value={form.inquiry} onChange={setField('inquiry')} required className="w-full px-3 py-2.5 border border-slate-300 rounded-md focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 bg-white text-sm">
                      <option value="trial">無料トライアルを始めたい</option>
                      <option value="consultation">導入について相談したい</option>
                      <option value="demo">デモを見たい</option>
                      <option value="contact">その他のお問い合わせ</option>
                    </select>
                  </div>
                  <div className="grid md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-semibold text-slate-700 mb-1.5">会社名 <span className="text-red-500">*</span></label>
                      <input type="text" required value={form.company} onChange={setField('company')} className="w-full px-3 py-2.5 border border-slate-300 rounded-md focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm" placeholder="株式会社サンプル"/>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-700 mb-1.5">部署</label>
                      <input type="text" value={form.department} onChange={setField('department')} className="w-full px-3 py-2.5 border border-slate-300 rounded-md focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm" placeholder="設計部"/>
                    </div>
                  </div>
                  <div className="grid md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-semibold text-slate-700 mb-1.5">お名前 <span className="text-red-500">*</span></label>
                      <input type="text" required value={form.name} onChange={setField('name')} className="w-full px-3 py-2.5 border border-slate-300 rounded-md focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm" placeholder="山田 太郎"/>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-700 mb-1.5">メールアドレス <span className="text-red-500">*</span></label>
                      <input type="email" required value={form.email} onChange={setField('email')} className="w-full px-3 py-2.5 border border-slate-300 rounded-md focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm" placeholder="taro@example.com"/>
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-700 mb-1.5">電話番号</label>
                    <input type="tel" value={form.phone} onChange={setField('phone')} className="w-full px-3 py-2.5 border border-slate-300 rounded-md focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm" placeholder="03-0000-0000"/>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-700 mb-1.5">メッセージ</label>
                    <textarea rows={4} value={form.message} onChange={setField('message')} className="w-full px-3 py-2.5 border border-slate-300 rounded-md focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-sm resize-none" placeholder="ご相談内容、現在お使いのCADソフト、対象ファイルの種類など"/>
                  </div>
                  <div className="flex items-start gap-2 text-sm text-slate-600 pt-1">
                    <input id="contact-agree" type="checkbox" checked={agree} onChange={(e) => setAgree(e.target.checked)} className="mt-0.5 w-4 h-4 accent-emerald-500 cursor-pointer"/>
                    <label htmlFor="contact-agree" className="cursor-pointer select-none">
                      <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); openLegal('privacy'); }} className="text-emerald-600 hover:underline font-medium">プライバシーポリシー</button>
                      <span> および </span>
                      <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); openLegal('terms'); }} className="text-emerald-600 hover:underline font-medium">利用規約</button>
                      <span> に同意します </span>
                      <span className="text-red-500">*</span>
                    </label>
                  </div>
                  {errorMsg && (
                    <div className="bg-red-50 border border-red-200 text-red-700 text-sm rounded-md px-3 py-2.5">
                      {errorMsg}
                    </div>
                  )}
                  <button type="submit" disabled={!agree || submitting} className="w-full py-3 rounded-lg bg-emerald-500 hover:bg-emerald-400 disabled:bg-slate-200 disabled:text-slate-400 disabled:cursor-not-allowed text-slate-950 font-bold transition shadow-lg shadow-emerald-300/40 disabled:shadow-none flex items-center justify-center gap-2">
                    {submitting ? (
                      <React.Fragment>
                        <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
                          <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeDasharray="40 60" opacity="0.5"/>
                        </svg>
                        送信中...
                      </React.Fragment>
                    ) : '送信する'}
                  </button>
                </form>
              </div>
            )}
          </div>
        </div>
      );
    };

    // 外部依存を減らすため、使用しているアイコンをインラインSVGとして定義
    const Icon = ({ name, size = 24, className = "" }) => {
      const icons = {
        Bot: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 8v4"/><path d="M8 15h.01"/><path d="M12 15h.01"/><path d="M16 15h.01"/></svg>,

                     {cases[activeTab].desc}
                   </p>

                   <div className="flex flex-wrap gap-3">
                     {cases[activeTab].tags.map((tag, i) => (
                       <span key={i} className="px-3 py-1 bg-slate-900 border border-slate-700 rounded-full text-sm text-slate-300 flex items-center gap-1.5">
                         <Icon name="CheckCircle2" size={14} className="text-emerald-400"/> {tag}
                       </span>
                     ))}
                   </div>
                 </div>
              </div>
            </div>
          </div>
        </section>
      );
    };

    const Onboarding = () => {
      const openContact = useContact();
      const steps = [
        {
          icon: 'PenTool',
          title: 'お問い合わせ・ヒアリング',
          duration: '1〜2日',
          desc: '取り扱うファイル形式・業務フロー・既存ツールをヒアリング。最適な活用シーンと導入規模を一緒に整理します。',
        },
        {
          icon: 'Zap',
          title: '無料トライアル',
          duration: '14日間',
          desc: 'デスクトップアプリをすぐにインストール可能。実データを使って 2D/3D ビューアと AI エージェントの動作を検証いただきます。',
        },
        {
          icon: 'Folder',
          title: '業務フィット検証',
          duration: '2〜4週間',
          desc: '社内フォルダ構成とのすり合わせ、よく使う Python スクリプトの整備、業務に特化した AI 指示プロンプトのチューニングを支援します。',
        },
        {
          icon: 'Building',
          title: '本格導入・社内展開',
          duration: '〜',
          desc: 'ライセンス契約後、社内研修・運用ガイドの整備までサポート。導入後も継続的なアップデートと活用支援を提供します。',
        },
      ];

      return (
        <section id="onboarding" className="py-24 bg-slate-50 border-t border-slate-200">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="text-center mb-16">
              <h2 className="text-3xl font-bold text-slate-900 sm:text-4xl mb-4">
                導入までの流れ
              </h2>
              <p className="text-lg text-slate-600">
                お問い合わせから本格導入まで、専任担当が伴走します。
              </p>
            </div>

            <div className="relative max-w-6xl mx-auto">
              {/* Connector line behind icon circles (desktop only) */}
              <div className="hidden lg:block absolute top-14 left-[12%] right-[12%] h-0.5 bg-gradient-to-r from-emerald-200 via-emerald-500 to-emerald-200" aria-hidden="true"></div>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 relative">
                {steps.map((step, i) => (
                  <div key={i} className="relative bg-white rounded-2xl pt-12 pb-6 px-6 border border-slate-200 shadow-sm flex flex-col">
                    <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-14 h-14 rounded-full bg-emerald-500 text-white flex items-center justify-center shadow-lg shadow-emerald-300/40 ring-4 ring-slate-50">
                      <Icon name={step.icon} size={24}/>
                    </div>
                    <div className="text-center mb-4">
                      <div className="text-[11px] font-semibold tracking-[0.15em] text-emerald-600 mb-1">STEP {String(i + 1).padStart(2, '0')}</div>
                      <h3 className="text-lg font-bold text-slate-900 mb-1.5">{step.title}</h3>
                      <div className="inline-flex items-center gap-1 text-[11px] text-slate-500 bg-slate-100 border border-slate-200 rounded-full px-2 py-0.5">
                        所要期間: {step.duration}
                      </div>
                    </div>
                    <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
                  </div>
                ))}
              </div>
            </div>

            <div className="mt-16 max-w-4xl mx-auto bg-white rounded-2xl border border-slate-200 shadow-sm p-6 md:p-8 flex flex-col md:flex-row items-start md:items-center gap-6">
              <div className="flex-1">
                <div className="flex items-center gap-2 mb-2">
                  <Icon name="Shield" size={18} className="text-emerald-500"/>
                  <span className="text-[11px] font-semibold tracking-wider text-emerald-600">SECURE BY DESIGN</span>
                </div>
                <h3 className="text-lg font-bold text-slate-900 mb-1">機密データはローカルのまま</h3>
                <p className="text-sm text-slate-600 leading-relaxed">
                  社内ネットワーク・オンプレ環境にも対応。図面や仕様書を社外に出さずに AI を活用できる構成をご提案します。
                </p>
              </div>
              <button onClick={() => openContact('consultation')} className="shrink-0 inline-flex items-center gap-2 bg-emerald-500 hover:bg-emerald-400 text-slate-950 px-6 py-3 rounded-lg text-sm font-bold transition shadow-lg shadow-emerald-300/40">
                導入のご相談 <Icon name="ArrowRight" size={16}/>
              </button>
            </div>
          </div>
        </section>
      );
    };

    const CTA = () => {
      const openContact = useContact();
      return (
        <section className="py-20 bg-slate-950 relative overflow-hidden border-t border-slate-900">
          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[700px] h-[300px] bg-emerald-500/20 blur-[120px] rounded-full pointer-events-none"></div>
          {/* Decorative patterns */}
          <div className="absolute top-0 right-0 -mt-20 -mr-20 text-emerald-500/10 opacity-30">
            <Icon name="Bot" size={400} />
          </div>
          <div className="relative max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center z-10">
            <h2 className="text-3xl md:text-4xl font-bold text-white mb-6">
              AIと共に、モノづくりの新しい働き方を始めよう。
            </h2>
            <p className="text-slate-300 text-lg mb-10 max-w-2xl mx-auto">
              あなたの作業PCで動く、Windows 向けデスクトップアプリ。
            </p>
            <button onClick={() => openContact('trial')} className="bg-emerald-500 text-slate-950 px-8 py-4 rounded-xl text-lg font-bold hover:bg-emerald-400 transition shadow-xl shadow-emerald-900/40">
              無料トライアルを始める
            </button>
          </div>
        </section>
      );
    };

    const Footer = () => {
      const openContact = useContact();
      const openLegal = useLegal();
      return (
        <footer className="bg-slate-950 text-slate-400 py-12 border-t border-slate-900">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div className="flex items-center gap-2">
              <Icon name="Bot" size={24} className="text-emerald-400" />
              <span className="text-xl font-bold text-white">FabCoWork</span>
            </div>
            <div className="flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm">
              <button onClick={() => openLegal('terms')} className="hover:text-white transition">利用規約</button>
              <button onClick={() => openLegal('privacy')} className="hover:text-white transition">プライバシーポリシー</button>
              <a href="https://willrobotics.com/" target="_blank" rel="noopener noreferrer" className="hover:text-white transition">運営会社</a>
              <button onClick={() => openContact('contact')} className="hover:text-white transition">お問い合わせ</button>
            </div>
            <div className="text-sm">
              &copy; {new Date().getFullYear()} WillRobotics LLC. All rights reserved.
            </div>
          </div>
        </footer>
      );
    };

    const App = () => {
      const [contact, setContact] = useState({ open: false, type: 'contact' });
      const openContact = (type = 'contact') => setContact({ open: true, type });
      const closeContact = () => setContact((c) => ({ ...c, open: false }));

      const [legal, setLegal] = useState({ open: false, kind: null });
      const openLegal = (kind) => setLegal({ open: true, kind });
      const closeLegal = () => setLegal((l) => ({ ...l, open: false }));

      return (
        <ContactContext.Provider value={openContact}>
          <LegalContext.Provider value={openLegal}>
            <div className="min-h-screen bg-white font-sans text-slate-900 selection:bg-emerald-200">
              <Header />
              <main>
                <Hero />
                <Features />
                <UseCases />
                <Onboarding />
                <CTA />
              </main>
              <Footer />
              <ContactForm open={contact.open} type={contact.type} onClose={closeContact} />
              <LegalModal open={legal.open} kind={legal.kind} onClose={closeLegal} />
            </div>
          </LegalContext.Provider>
        </ContactContext.Provider>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
